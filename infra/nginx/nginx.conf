# NGINX reverse proxy for the assessment platform.
# Terminates client traffic and routes to web (Next.js) and api (NestJS x3).
# WebSocket upgrade + ip_hash sticky sessions ensure Socket.IO connections are
# stable; the Redis adapter (MR-2) handles cross-replica broadcast either way.

worker_processes auto;
events { worker_connections 8192; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 2m; # API body limit is 1mb; allow headroom.

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # api replicas. ip_hash keeps a given client pinned to one replica
  # (helpful for websocket handshakes); Redis adapter covers fan-out.
  upstream api_upstream {
    ip_hash;
    server api:3001;
    # docker compose scales this service; compose DNS round-robins the rest.
  }

  upstream web_upstream {
    server web:3000;
  }

  server {
    listen 80;
    server_name _;

    # REST API.
    location /api/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health passthrough.
    location /health {
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
    }

    # Socket.IO (attempts namespace) - requires upgrade headers.
    location /socket.io/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Everything else -> Next.js.
    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
