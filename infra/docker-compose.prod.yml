# Production deployment for a single dedicated server (Docker + Compose).
# Host: Dual Xeon E5-2679 v4 (72 threads), 768 GB RAM, NVMe.
# Target: 5000+ concurrent students.
#
# Usage:
#   cp infra/.env.production.example infra/.env.production   # then edit
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.production up -d --build
#
# Migrations (run once, against Postgres directly, not PgBouncer):
#   docker compose -f infra/docker-compose.prod.yml run --rm migrate
#
# Notes:
# - Replica counts and CPU/memory reservations are sized conservatively for the
#   host and can be tuned. The executor is the CPU-heavy component.
# - The executor mounts the host Docker socket to spawn sandbox containers.
#   Run with gVisor (SANDBOX_RUNTIME=runsc) in production.

name: alex-assessment

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on: [web, api]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "2", memory: 1g }

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    environment:
      NODE_ENV: production
    depends_on: [api]
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "4", memory: 4g }

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      BODY_LIMIT: ${BODY_LIMIT}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT}
      THROTTLE_TTL_MS: ${THROTTLE_TTL_MS}
    depends_on: [pgbouncer, redis]
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "6", memory: 8g }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  executor:
    build:
      context: ..
      dockerfile: infra/docker/executor.Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SANDBOX_RUNTIME: ${SANDBOX_RUNTIME}
    volumes:
      # Required to spawn sandbox containers on the host engine.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: [pgbouncer, redis]
    restart: unless-stopped
    deploy:
      replicas: 4
      resources:
        limits: { cpus: "8", memory: 8g }

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Tuned for a large-RAM host; adjust to taste.
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=8GB"
      - "-c"
      - "effective_cache_size=24GB"
      - "-c"
      - "work_mem=32MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "12", memory: 48g }

  pgbouncer:
    image: edoburu/pgbouncer:latest
    env_file:
      - ./pgbouncer/pgbouncer.env
    depends_on: [postgres]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "2", memory: 1g }

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning --maxmemory 16gb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "4", memory: 18g }

  # One-shot migration runner (connects to Postgres directly, NOT PgBouncer).
  migrate:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on: [postgres]
    working_dir: /app
    entrypoint: ["npx", "prisma", "migrate", "deploy", "--schema", "packages/database/prisma/schema.prisma"]
    restart: "no"
    profiles: ["tools"]

volumes:
  postgres_data:
  redis_data:
